---
layout: default
---

<article class="post">
  <header class="post-header">
    <p class="post-date">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
    </p>
    <h1>{{ page.title }}</h1>
    <p class="post-author">By {{ page.author | default: site.author }}</p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  {% assign tag_count = page.tags | size %}
  {% if tag_count > 0 %}
    <footer class="post-tags" aria-label="Tags">
      {% for tag in page.tags %}
        <span>{{ tag }}</span>
      {% endfor %}
    </footer>
  {% endif %}
</article>
