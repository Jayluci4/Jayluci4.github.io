<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} | {{ site.description }}{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to content</a>

    <header class="site-header">
      <div class="wrap">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <p class="site-description">{{ site.description }}</p>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="https://github.com/Jayluci4/Jayluci4.github.io">GitHub</a>
        </nav>
      </div>
    </header>

    <main id="content" class="page-shell">
      {{ content }}
    </main>

    <script src="{{ '/assets/js/read-aloud.js' | relative_url }}" defer></script>
  </body>
</html>
